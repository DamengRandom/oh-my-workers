name: Daily TypeScript Quiz

on:
  schedule:
    # 10:00 PM UTC = 8:00 AM AEST (UTC+10, Apr-Oct)
    # Note: during AEDT (Oct-Apr, UTC+11) this fires at 9:00 AM Sydney time
    - cron: '0 22 * * *'
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  quiz:
    name: Generate and send TypeScript quiz
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.actor == 'DamengRandom'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Run quiz agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.NEON_WORK_COORDINATOR_DB_URL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          QUIZ_EMAIL_RECIPIENT: ${{ secrets.QUIZ_EMAIL_RECIPIENT }}
        run: pnpm quiz
